<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>ООО Зенит — идёт обновление</title>
    <link rel="icon" type="image/png" href="/__guardian/favicon.png">
    <style>
        :root { --accent: #5b9df6; --glow: rgba(91, 157, 246, 0.45); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
            background: radial-gradient(circle at 50% 38%, #0f121a 0%, #05060b 100%);
            color: #e8eef9;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 24px; -webkit-font-smoothing: antialiased;
        }
        .card {
            width: 100%; max-width: 460px; text-align: center;
            background: linear-gradient(160deg, rgba(20,26,42,0.92), rgba(11,15,26,0.96));
            border: 1px solid rgba(91,157,246,0.16); border-radius: 26px;
            padding: 44px 34px 34px; box-shadow: 0 30px 70px rgba(0,0,0,0.45);
            animation: rise 0.5s ease both;
        }
        @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        .logo-wrap { width: 92px; height: 92px; margin: 0 auto 10px; position: relative; }
        .logo-wrap img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 4px 18px var(--glow));
        }
        .ring {
            position: absolute; inset: -10px; border-radius: 50%;
            border: 2px solid rgba(91,157,246,0.18);
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 {
            font-size: 1.5rem; font-weight: 800; letter-spacing: 0.2px;
            margin: 18px 0 14px;
            background: linear-gradient(120deg, #ffffff, #bcd9ff 60%, var(--accent));
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        p { color: #9fb0cc; line-height: 1.6; font-size: 1rem; }
        .bar {
            margin: 26px auto 6px; width: 70%; height: 5px; border-radius: 4px;
            background: rgba(91,157,246,0.15); overflow: hidden;
        }
        .bar i {
            display: block; height: 100%; width: 40%; border-radius: 4px;
            background: var(--accent); animation: slide 1.3s ease-in-out infinite;
        }
        @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
        .status { font-size: 0.86rem; color: #6f7f9d; margin-top: 6px; }
        .vk-link {
            display: inline-flex; align-items: center; gap: 8px; margin-top: 26px; padding-top: 22px;
            border-top: 1px solid rgba(255,255,255,0.06); width: 100%; justify-content: center;
            color: var(--accent); text-decoration: none; font-weight: 600; transition: opacity 0.2s;
        }
        .vk-link:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-wrap">
            <div class="ring"></div>
            <img src="/__guardian/logo.png" alt="ООО Зенит">
        </div>
        <h1>Идёт обновление</h1>
        <p>Устанавливаем свежую версию сайта.<br>Это займёт меньше минуты — страница откроется сама.</p>
        <div class="bar"><i></i></div>
        <div class="status" id="status">Применяем обновление…</div>
        <a class="vk-link" href="https://vk.com/zenit_s1" target="_blank" rel="noopener">
            Наша группа ВКонтакте →
        </a>
    </div>
    <script>
        function check() {
            fetch('/__guardian/health', { cache: 'no-store' })
                .then(function (r) { return r.ok ? r.json() : { up: false }; })
                .then(function (j) {
                    if (j && j.up) {
                        document.getElementById('status').textContent = 'Готово, открываем…';
                        location.reload();
                    }
                })
                .catch(function () {});
        }
        setInterval(check, 5000);
        setTimeout(check, 1500);
    </script>
</body>
</html>
